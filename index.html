<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,100;9..144,400;9..144,700;9..144,900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fraunces', serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 28px 48px;
    border-bottom: 0.5px solid #ebebeb;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #111;
    text-decoration: none;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: #F03621; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 60px 48px 70px;
  }

  .name-block { display: inline-flex; flex-direction: column; line-height: 0.93; }
  .first-wrap { position: relative; display: inline-block; }
  .ellipse-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 118%;
    height: 175%;
    z-index: 0;
  }
  .first {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 88px;
    color: #1338BE;
    display: block;
    line-height: 0.93;
    position: relative;
    z-index: 1;
  }
  .last {
    font-family: 'Fraunces', serif;
    font-weight: 100;
    font-size: 88px;
    color: #F03621;
    display: block;
    line-height: 0.93;
    margin-top: 6px;
  }
  .sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #bbb;
    margin-top: 28px;
  }

  footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 22px;
    padding: 20px 48px;
    border-top: 0.5px solid #ebebeb;
  }
  footer a {
    color: #ccc;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }
  footer a:hover { color: #F03621; }
  footer svg { width: 17px; height: 17px; fill: currentColor; }

  @media (max-width: 600px) {
    .first, .last { font-size: 52px; }
    nav { padding: 20px 24px; }
    main { padding: 40px 24px 50px; }
    footer { padding: 16px 24px; }
    .nav-links { gap: 20px; }
    .nav-links a { font-size: 9px; }
  }
</style>
</head>

<nav>
  <div class="nav-links">

        <ellipse cx="110" cy="35" rx="108" ry="33" fill="#F03621" opacity="0.12"/>
      </svg>
      <span class="first">Geanna</span>
    </span>
    <span class="last">Orozco</span>
  </div>
  <div class="sub">Filmmaker — Atlanta, Georgia</div>
</main>
